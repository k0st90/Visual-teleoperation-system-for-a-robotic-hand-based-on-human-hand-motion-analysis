version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hand_teleop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hand_teleop
      POSTGRES_USER:     teleop
      POSTGRES_PASSWORD: teleop123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
